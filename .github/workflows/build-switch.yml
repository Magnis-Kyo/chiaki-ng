name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Switch version
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            devkitpro/devkita64:latest \
            bash -lc '
              set -euxo pipefail

              apt-get update
              apt-get install -y \
                cmake \
                make \
                ninja-build \
                pkg-config \
                protobuf-compiler \
                libprotobuf-dev \
                libglfw3-dev \
                libsdl2-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libgl1-mesa-dev \
                libdrm-dev \
                libdav1d-dev \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libswscale-dev \
                libswresample-dev

              cd /workspace/switch
              mkdir -p build
              cd build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_MODULE_PATH=/workspace/cmake \
                -DGLAPI=/usr/lib/x86_64-linux-gnu/libglapi.so.0 \
                -DDRM_NOUVEAU=/usr/lib/x86_64-linux-gnu/libdrm_nouveau.so.2 \
                -DSDL2=/usr/lib/x86_64-linux-gnu/libSDL2.so.0

              ninja

              echo "=== OUTPUT ==="
              find . -type f | grep -E "\.(nro|elf|nacp)$" || true
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            switch/build/**/*.nro
            switch/build/**/*.elf
            switch/build/**/*.nacp
            switch/build/*.nro
            switch/build/*.elf
            switch/build/*.nacp
