name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build using devkitPro Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            devkitpro/devkita64:latest \
            bash -lc "
              set -e
              cd /workspace

              mkdir -p build
              cd build

              cmake .. \
                -DNSWITCH=ON \
                -DCHIAKI_ENABLE_GUI=OFF \
                -DCHIAKI_ENABLE_CLI=OFF \
                -DCHIAKI_ENABLE_TESTS=OFF \
                -DCHIAKI_ENABLE_STEAM=OFF \
                -DCHIAKI_ENABLE_FFMPEG=OFF \
                -DCHIAKI_ENABLE_BOREALIS=ON

              make -j\$(nproc)
            "

      - name: Find build output
        run: |
          find . -type f | grep -E '\.nro$|\.elf$|\.nacp$' || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            build/*.nro
            build/**/*.nro
            **/*.nro
