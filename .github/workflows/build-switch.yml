name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Switch version (correct way)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            devkitpro/devkita64:latest \
            bash -lc "
              set -e

              cd /workspace/switch

              mkdir -p build
              cd build

              cmake .. -DCMAKE_BUILD_TYPE=Release

              make -j\$(nproc)

              echo '=== OUTPUT ==='
              find . -name '*.nro'
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            switch/build/*.nro
            switch/build/**/*.nro
