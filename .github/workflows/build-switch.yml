name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build root project with Switch target
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            devkitpro/devkita64:latest \
            bash -lc '
              set -euxo pipefail

              apt-get update
              apt-get install -y \
                cmake \
                ninja-build \
                pkg-config \
                protobuf-compiler \
                libprotobuf-dev \
                libssl-dev \
                libglfw3-dev \
                libsdl2-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libgl1-mesa-dev \
                libdrm-dev \
                libdav1d-dev \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libswscale-dev \
                libswresample-dev \
                libglm-dev \
                libopus-dev

              cd /workspace
              rm -rf build
              mkdir build
              cd build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_MODULE_PATH=/workspace/cmake \
                -DNSWITCH=ON \
                -DCHIAKI_ENABLE_GUI=OFF \
                -DCHIAKI_ENABLE_CLI=OFF \
                -DCHIAKI_ENABLE_TESTS=OFF \
                -DCHIAKI_ENABLE_STEAM_SHORTCUT=OFF \
                -DCHIAKI_ENABLE_STEAMDECK_NATIVE=OFF \
                -DCHIAKI_ENABLE_BOREALIS=ON \
                -DCHIAKI_ENABLE_FFMPEG_DECODER=ON \
                -DCHIAKI_ENABLE_PI_DECODER=OFF \
                -DCHIAKI_USE_SYSTEM_CURL=OFF

              ninja chiaki-borealis || ninja switch || ninja

              echo "=== OUTPUT FILES ==="
              find . -type f | grep -E "\.(nro|elf|nacp)$" || true
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            build/**/*.nro
            build/**/*.elf
            build/**/*.nacp
            build/*.nro
            build/*.elf
            build/*.nacp
