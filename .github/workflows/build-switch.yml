name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Switch version (correct way)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            devkitpro/devkita64:latest \
            bash -lc "
              set -e

              apt-get update
              apt-get install -y \
                cmake \
                make \
                pkg-config \
                libglfw3-dev \
                libgles2-mesa-dev \
                libegl1-mesa-dev \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libswscale-dev \
                libswresample-dev

              cd /workspace/switch

              mkdir -p build
              cd build

              cmake .. -DCMAKE_BUILD_TYPE=Release

              make -j\$(nproc)

              echo '=== OUTPUT ==='
              find . -name '*.nro' -o -name '*.elf' -o -name '*.nacp'
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            switch/build/*.nro
            switch/build/**/*.nro
            switch/build/*.elf
            switch/build/**/*.elf
            switch/build/*.nacp
            switch/build/**/*.nacp
