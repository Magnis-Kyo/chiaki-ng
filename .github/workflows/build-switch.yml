name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Switch version
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            devkitpro/devkita64:latest \
            bash -lc '
              set -euxo pipefail

              apt-get update
              apt-get install -y \
                cmake \
                ninja-build \
                pkg-config \
                protobuf-compiler \
                libprotobuf-dev \
                libglfw3-dev \
                libsdl2-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libgl1-mesa-dev \
                libdrm-dev \
                libdav1d-dev \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libswscale-dev \
                libswresample-dev \
                libglm-dev

              SDL2_REAL="$(readlink -f "$(ldconfig -p | awk '"'"'/libSDL2-2\.0\.so\.0|libSDL2\.so\.0/ {print $NF; exit}'"'"')")"
              GLAPI_REAL="$(readlink -f "$(ldconfig -p | awk '"'"'/libglapi\.so\.0/ {print $NF; exit}'"'"')")"
              DRM_NOUVEAU_REAL="$(readlink -f "$(ldconfig -p | awk '"'"'/libdrm_nouveau\.so\.2/ {print $NF; exit}'"'"')")"
              GLFW_REAL="$(readlink -f "$(ldconfig -p | awk '"'"'/libglfw\.so\.3/ {print $NF; exit}'"'"')")"

              test -n "$SDL2_REAL"
              test -n "$GLAPI_REAL"
              test -n "$DRM_NOUVEAU_REAL"
              test -n "$GLFW_REAL"

              cd /workspace/switch
              rm -rf build
              mkdir -p build
              cd build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_MODULE_PATH=/workspace/cmake \
                -DCMAKE_C_FLAGS="-I/workspace/include" \
                -DCMAKE_CXX_FLAGS="-I/workspace/include" \
                -DGLAPI="$GLAPI_REAL" \
                -DDRM_NOUVEAU="$DRM_NOUVEAU_REAL" \
                -DSDL2="$SDL2_REAL" \
                -Dglfw3_DIR=/usr/lib/x86_64-linux-gnu/cmake/glfw3

              ninja

              echo "=== OUTPUT ==="
              find . -type f | grep -E "\.(nro|elf|nacp)$" || true
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            switch/build/**/*.nro
            switch/build/**/*.elf
            switch/build/**/*.nacp
            switch/build/*.nro
            switch/build/*.elf
            switch/build/*.nacp
