name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Chiaki-ng
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            devkitpro/devkita64:latest \
            bash -lc '
              set -euxo pipefail

              # 1. Install Switch-specific dependencies via dkp-pacman
              # We need the switch- versions of these libraries, not the apt-get versions
              dkp-pacman -Syyu --noconfirm
              dkp-pacman -S --noconfirm \
                switch-dev \
                switch-sdl2 \
                switch-ffmpeg \
                switch-opus \
                switch-mbedtls \
                switch-protobuf \
                switch-libvpx \
                switch-libyuv \
                switch-curl \
                switch-cmake \
                switch-pkg-config

              cd /workspace
              rm -rf build
              mkdir build
              cd build

              # 2. Use the Switch toolchain file provided by devkitPro
              # This tells CMake exactly how to build for the Switch hardware
              cmake .. \
                -G Ninja \
                -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DNSWITCH=ON \
                -DCHIAKI_ENABLE_GUI=OFF \
                -DCHIAKI_ENABLE_CLI=OFF \
                -DCHIAKI_ENABLE_BOREALIS=ON \
                -DCHIAKI_ENABLE_FFMPEG_DECODER=ON \
                -DCHIAKI_USE_SYSTEM_CURL=ON

              ninja
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            build/*.nro
            build/*.elf
            build/*.nacp
