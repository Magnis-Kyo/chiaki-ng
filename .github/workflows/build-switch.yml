name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch_x64:
    name: Build chiaki-ng switch_x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: chiaki-ng

      - name: Install devkitPro
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget ca-certificates gnupg
          curl -fsSL https://apt.devkitpro.org/install-devkitpro-pacman | sudo bash
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm switch-dev

      - name: Build Chiaki for Switch
        run: |
          cd chiaki-ng
          mkdir -p build
          cd build
          cmake .. -DSWITCH=ON
          make -j$(nproc)

      - name: Find build output
        run: |
          find chiaki-ng -type f | grep -E '\.nro$|\.elf$|\.nacp$' || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            chiaki-ng/build/*.nro
            chiaki-ng/build/**/*.nro
