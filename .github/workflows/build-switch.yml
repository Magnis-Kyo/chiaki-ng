name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build using devkitPro Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            devkitpro/devkita64:latest \
            bash -c "
              set -e
              cd /workspace

              sed -i 's/pkg_check_modules(LIBPLACEBO REQUIRED libplacebo>=7.349.0)/# disabled for switch build/g' CMakeLists.txt

              mkdir -p build
              cd build
              cmake .. -DSWITCH=ON
              make -j\$(nproc)
            "

      - name: Find build output
        run: |
          find . -type f | grep -E '\.nro$|\.elf$|\.nacp$' || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            build/*.nro
            build/**/*.nro
            **/*.nro
