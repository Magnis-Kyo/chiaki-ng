name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Switch version
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            devkitpro/devkita64:latest \
            bash -lc '
              set -euxo pipefail

              apt-get update
              apt-get install -y \
                cmake \
                ninja-build \
                pkg-config \
                protobuf-compiler \
                libprotobuf-dev \
                libglfw3-dev \
                libsdl2-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libgl1-mesa-dev \
                libdrm-dev \
                libdav1d-dev \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libswscale-dev \
                libswresample-dev \
                libglm-dev

              mkdir -p /usr/lib/x86_64-linux-gnu

              SDL2_REAL="$(ldconfig -p | awk '"'"'/libSDL2-2\.0\.so\.0|libSDL2\.so\.0/ {print $NF; exit}'"'"')"
              [ -n "${SDL2_REAL:-}" ] && ln -sf "$SDL2_REAL" /usr/lib/x86_64-linux-gnu/libSDL2.so.0 || true

              GLAPI_REAL="$(ldconfig -p | awk '"'"'/libglapi\.so\.0/ {print $NF; exit}'"'"')"
              [ -n "${GLAPI_REAL:-}" ] && ln -sf "$GLAPI_REAL" /usr/lib/x86_64-linux-gnu/libglapi.so.0 || true

              DRM_NOUVEAU_REAL="$(ldconfig -p | awk '"'"'/libdrm_nouveau\.so\.2/ {print $NF; exit}'"'"')"
              [ -n "${DRM_NOUVEAU_REAL:-}" ] && ln -sf "$DRM_NOUVEAU_REAL" /usr/lib/x86_64-linux-gnu/libdrm_nouveau.so.2 || true

              GLFW_REAL="$(ldconfig -p | awk '"'"'/libglfw\.so\.3/ {print $NF; exit}'"'"')"
              [ -n "${GLFW_REAL:-}" ] && ln -sf "$GLFW_REAL" /usr/lib/x86_64-linux-gnu/libglfw.so.3.3 || true

              cd /workspace/switch
              mkdir -p build
              cd build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_MODULE_PATH=/workspace/cmake \
                -DCMAKE_C_FLAGS="-I/workspace/include" \
                -DCMAKE_CXX_FLAGS="-I/workspace/include" \
                -DGLAPI=/usr/lib/x86_64-linux-gnu/libglapi.so.0 \
                -DDRM_NOUVEAU=/usr/lib/x86_64-linux-gnu/libdrm_nouveau.so.2 \
                -DSDL2=/usr/lib/x86_64-linux-gnu/libSDL2.so.0

              ninja

              echo "=== OUTPUT ==="
              find . -type f | grep -E "\.(nro|elf|nacp)$" || true
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-switch-build
          path: |
            switch/build/**/*.nro
            switch/build/**/*.elf
            switch/build/**/*.nacp
            switch/build/*.nro
            switch/build/*.elf
            switch/build/*.nacp
