name: Build chiaki-ng for Switch

on:
  workflow_dispatch:

jobs:
  build-switch_x64:
    name: Build chiaki-ng switch_x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devkitPro
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.devkitpro.org/devkitpro-keyring.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/devkitpro.gpg
          echo "deb [signed-by=/etc/apt/keyrings/devkitpro.gpg] https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm switch-dev

      - name: Build Chiaki for Switch
        run: |
          cd chiaki-ng
          mkdir build
          cd build
          cmake .. -DSWITCH=ON
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-nro
          path: chiaki-ng/build/*.nro
